name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # create releases, upload assets, update release body
  id-token: write  # Sigstore keyless signing via GitHub OIDC

env:
  GH_TOKEN: ${{ github.token }}  # makes gh CLI work without extra config

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 11
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11
          echo "CC=gcc-11"  >> $GITHUB_ENV
          echo "CXX=g++-11" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            cmake pkg-config \
            portaudio19-dev libfftw3-dev libglfw3-dev \
            libgl1-mesa-dev libayatana-appindicator3-dev \
            libwayland-dev wayland-protocols libwayland-bin \
            libx11-dev libxfixes-dev nlohmann-json3-dev \
            libpulse-dev dpkg-dev rpm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package (DEB + RPM)
        run: |
          cd build
          cpack -G DEB
          cpack -G RPM

      - name: Resolve package paths
        run: |
          echo "DEB=$(ls build/*.deb | head -1)" >> $GITHUB_ENV
          echo "RPM=$(ls build/*.rpm | head -1)" >> $GITHUB_ENV

      # Install cosign directly from Sigstore's official GitHub releases.
      # No third-party action — we download the binary + checksum and verify
      # before using it.
      - name: Install Cosign
        run: |
          COSIGN_VERSION="v3.0.6"
          curl -Lo cosign-linux-amd64 \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          curl -Lo cosign_checksums.txt \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt"
          grep "cosign-linux-amd64$" cosign_checksums.txt | sha256sum --check
          chmod +x cosign-linux-amd64
          sudo mv cosign-linux-amd64 /usr/local/bin/cosign

      # v3 uses a single .sigstore.json bundle (replaces the old .sig + .crt pair from v2)
      - name: Sign packages (Sigstore keyless)
        run: |
          cosign sign-blob --yes --bundle "$DEB.sigstore.json" "$DEB"
          cosign sign-blob --yes --bundle "$RPM.sigstore.json" "$RPM"

      # gh CLI is GitHub's own tool — pre-installed on all GitHub-hosted runners.
      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          cat > release_notes.md << NOTES
          > ⚠️ Pre-release — Linux only. Windows support coming in a future release.

          ### Install

          **Ubuntu/Debian**
          \`\`\`bash
          sudo dpkg -i loopin-ambience-mode-${VERSION}-Linux.deb
          \`\`\`

          **Fedora/RHEL**
          \`\`\`bash
          sudo rpm -ivh loopin-ambience-mode-${VERSION}-1.x86_64.rpm
          \`\`\`

          ### Verify binary integrity (Sigstore)
          \`\`\`bash
          cosign verify-blob <binary> \
            --bundle <binary>.sigstore.json \
            --certificate-identity-regexp "https://github.com/bkmaxbaibhav/loopin-ambience-mode" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`
          NOTES

          # Delete any stale release for this tag so re-runs don't 422
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true

          gh release create "$GITHUB_REF_NAME" \
            --prerelease \
            --title "Loopin ${GITHUB_REF_NAME} — Linux" \
            --notes-file release_notes.md \
            "$DEB" "$DEB.sigstore.json" \
            "$RPM" "$RPM.sigstore.json"

      # Direct curl to VirusTotal API v3 — no third-party action.
      # API key is passed via env var so it is never interpolated into the
      # shell command string (GitHub masks it anyway, but belt-and-braces).
      - name: Upload to VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          upload() {
            local file="$1"
            curl -sf --request POST \
              --url https://www.virustotal.com/api/v3/files \
              --header "x-apikey: ${VT_API_KEY}" \
              --form "file=@${file}"
          }

          DEB_RESPONSE=$(upload "$DEB")
          RPM_RESPONSE=$(upload "$RPM")

          DEB_ID=$(echo "$DEB_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
          RPM_ID=$(echo "$RPM_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")

          echo "DEB_VT_URL=https://www.virustotal.com/gui/file-analysis/${DEB_ID}" >> $GITHUB_ENV
          echo "RPM_VT_URL=https://www.virustotal.com/gui/file-analysis/${RPM_ID}" >> $GITHUB_ENV

      - name: Append VirusTotal results to release body
        run: |
          CURRENT=$(gh release view "$GITHUB_REF_NAME" --json body -q .body)

          cat > updated_notes.md << NOTES
          ${CURRENT}

          ### 🛡️ VirusTotal Scan Results
          | File | Report |
          |---|---|
          | \`.deb\` | [View scan →](${DEB_VT_URL}) |
          | \`.rpm\` | [View scan →](${RPM_VT_URL}) |
          NOTES

          gh release edit "$GITHUB_REF_NAME" --notes-file updated_notes.md
