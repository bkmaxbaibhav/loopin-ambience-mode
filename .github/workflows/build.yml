name: Build and Package

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [created]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            portaudio19-dev \
            libfftw3-dev \
            libglfw3-dev \
            libgl1-mesa-dev \
            libappindicator3-dev \
            libwayland-dev \
            wayland-protocols \
            libwayland-bin \
            libx11-dev \
            libxfixes-dev \
            nlohmann-json3-dev \
            libpulse-dev \
            rpm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          cd build
          cpack -G DEB

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: loopin-ambience-mode-deb
          path: build/*.deb

      - name: Upload to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/*.deb
